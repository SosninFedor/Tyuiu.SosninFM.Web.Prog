<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ столиков - Суши-бар</title>
    <link rel="stylesheet" href="style.css">
    <style>
        form {
            background-color: #fff8e7;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            max-width: 600px;
            margin: 20px auto;
        }
        fieldset {
            border: 2px solid #C71585;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        legend {
            color: #C71585;
            font-weight: bold;
            font-size: 18px;
            padding: 0 10px;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #C71585;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 2px solid #FFB6C1;
            border-radius: 5px;
            font-size: 16px;
        }
        input[type="radio"], input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .radio-group {
            margin: 10px 0;
        }
        .radio-group label {
            display: inline;
            font-weight: normal;
        }
        button {
            background-color: #FF1493;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            background-color: #C71585;
        }
    </style>
</head>
<body>

<nav>
    <div><a href="index.html">Главная</a></div>
    <div><a href="catalogosn.html">Горячие блюда</a></div>
    <div><a href="catalogushi.html">Суши</a></div>
    <div><a href="catalogroll.html">Роллы</a></div>
    <div><a href="pricelist.html" target="_blank">Прайс-лист</a></div>
    <div><a href="#">Заказ столиков</a></div>
    <div><a href="takeaway.html">Заказ на вынос</a></div>
</nav>

<main>
    <h1 align="center"><font color="#FF1493">СУШИ-БАР "ЯПОНСКИЙ ДВОРИК"</font></h1>

    <div align="center">
        <marquee loop="infinite" behavior="scroll" bgcolor="DeepPink" direction="left" height="50" width="1000">
            🍣 ЗАКАЗ СТОЛИКОВ 🍣
        </marquee>
    </div>

    <h2 align="center">📞 Заказ столиков</h2>

    <form action="mailto:order@yokogama.ru" method="post" enctype="text/plain">
        
        <!-- Поле для имени -->
        <p>
            <label for="name">Как к Вам обращаться?</label>
            <input type="text" name="name" id="name" required placeholder="Введите ваше имя">
        </p>

        <!-- Поле для телефона -->
        <p>
            <label for="phone">По какому телефону Вам перезвонить?</label>
            <input type="text" name="phone" id="phone" required placeholder="+7 (___) ___-__-__">
        </p>

        <!-- Поле для времени -->
        <p>
            <label for="time">На какое время желаете заказать столик?</label>
            <input type="time" name="time" id="time" required>
        </p>

        <!-- Поле для количества гостей -->
        <p>
            <label for="guests">Количество гостей</label>
            <input type="number" name="guests" id="guests" min="1" max="10" value="2" required>
        </p>

        <!-- Переключатели для выбора зала -->
        <fieldset>
            <legend>Выберите зал</legend>
            
            <div class="radio-group">
                <input type="radio" name="hall" id="main" value="main" checked>
                <label for="main">Основной зал</label>
            </div>
            
            <div class="radio-group">
                <input type="radio" name="hall" id="vip" value="vip">
                <label for="vip">VIP-зал</label>
            </div>
            
            <div class="radio-group">
                <input type="radio" name="hall" id="summer" value="summer">
                <label for="summer">Летняя веранда</label>
            </div>
        </fieldset>

        <!-- Флажок про детей -->
        <p>
            <input type="checkbox" name="children" id="children" value="yes">
            <label for="children" style="display: inline;">👶 Среди клиентов будут дети</label>
        </p>

        <!-- Кнопка отправки -->
        <button type="submit">Забронировать столик</button>

    </form>

    <p align="center">
        <a href="index.html" style="color: #FF1493;">Вернуться на главную</a>
    </p>
</main>

<hr>

</address>

</body>
</html>
