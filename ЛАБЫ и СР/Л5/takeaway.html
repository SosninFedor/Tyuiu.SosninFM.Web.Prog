<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ еды на вынос - Суши-бар</title>
    <link rel="stylesheet" href="style.css">
    <style>
        form {
            background-color: #fff8e7;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #FF1493;
            max-width: 600px;
            margin: 20px auto;
        }
        label {
            display: block;
            margin-top: 15px;
            color: #C71585;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 2px solid #FFB6C1;
            border-radius: 5px;
            font-size: 16px;
        }
        select {
            height: auto;
            min-height: 200px;
        }
        optgroup {
            font-weight: bold;
            color: #C71585;
        }
        option {
            padding: 5px;
        }
        button {
            background-color: #FF1493;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
        button:hover {
            background-color: #C71585;
        }
    </style>
</head>
<body>

<nav>
    <div><a href="index.html">Главная</a></div>
    <div><a href="catalogosn.html">Горячие блюда</a></div>
    <div><a href="catalogushi.html">Суши</a></div>
    <div><a href="catalogroll.html">Роллы</a></div>
    <div><a href="pricelist.html" target="_blank">Прайс-лист</a></div>
    <div><a href="order.html">Заказ столиков</a></div>
    <div><a href="#">Заказ на вынос</a></div>
</nav>

<main>
    <h1 align="center"><font color="#FF1493">СУШИ-БАР "ЯПОНСКИЙ ДВОРИК"</font></h1>

    <div align="center">
        <marquee loop="infinite" behavior="scroll" bgcolor="DeepPink" direction="left" height="50" width="1000">
            🥢 ЗАКАЗ ЕДЫ НА ВЫНОС 🥢
        </marquee>
    </div>

    <h2 align="center">📞 Заказ еды на вынос</h2>

    <form action="mailto:order@yokogama.ru" method="post" enctype="text/plain">
        
        <!-- Поле для телефона -->
        <p>
            <label for="phone">Ваш телефон для связи</label>
            <input type="text" name="phone" id="phone" required placeholder="+7 (___) ___-__-__">
        </p>

        <!-- Список блюд с множественным выбором -->
        <p>
            <label for="dishes">Что желаете заказать? (можно выбрать несколько блюд)</label>
            <select name="dishes" id="dishes" size="6" multiple>
                <optgroup label="Горячие блюда">
                    <option value="unagi">Фузилли с кальмаром</option>
                    <option value="hamachi">Том Ям</option>
                    <option value="gedza">Гёдза</option>
                </optgroup>
                <optgroup label="Суши">
                    <option value="chukka">Суши с копченым лососем</option>
                    <option value="maguro">Суши с королевской креветкой</option>
                    <option value="tobiko">Суши с угрем</option>
                </optgroup>
            </select>
        </p>

        <!-- Регулятор оценки -->
        <p>
            <label for="rating">Оцените нашу кухню (1 - ужасно, 10 - превосходно)</label>
            <input type="range" name="rating" id="rating" min="1" max="10" value="8">
            <output for="rating" style="display: block; text-align: center;">8</output>
        </p>
        <script>
            document.getElementById('rating').addEventListener('input', function(e) {
                document.querySelector('output[for="rating"]').textContent = e.target.value;
            });
        </script>

        <!-- Кнопка отправки -->
        <button type="submit">Оформить заказ</button>

    </form>

    <p align="center">
        <a href="index.html" style="color: #FF1493;">Вернуться на главную</a>
    </p>
</main>

<hr>

</address>

</body>
</html>
